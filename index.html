<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JL Sites • Agência Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:#020b18;
color:white;
}

header{
background:#041b2d;
padding:20px;
text-align:center;
}

header h1{
font-size:32px;
margin-bottom:10px;
}

nav a{
color:white;
text-decoration:none;
margin:5px;
padding:8px 15px;
background:rgba(255,255,255,0.1);
border-radius:10px;
display:inline-block;
}

.hero{
text-align:center;
padding:30px 20px;
}

.btn{
background:#25D366;
color:black;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
text-decoration:none;
display:inline-block;
margin-top:15px;
}

.planos{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
padding:20px;
}

.card{
width:90%;
max-width:350px;
background:#0b2f4d;
padding:40px;
text-align:center;
border-radius:15px;
font-size:28px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#041b2d;
width:90%;
max-width:400px;
padding:20px;
border-radius:15px;
text-align:center;
}

.modal img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.fechar{
background:red;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
font-size:18px;
}
</style>
</head>

<body>

<header>
<h1>JL SITES • Agência Premium</h1>
<nav>
<a href="#">Início</a>
<a href="#">Planos</a>
<a href="#">Portfólio</a>
<a href="#">Contato</a>
</nav>
</header>

<section class="hero">
<h2>Transforme sua ideia em realidade</h2>
<p>Sites modernos, rápidos e profissionais</p>
<a class="btn" href="https://wa.me/5513996469617">💬 Pedir Orçamento</a>
</section>

<section class="planos">

<div class="card" onclick="abrirPlano('empresa')">Site Empresa</div>
<div class="card" onclick="abrirPlano('loja')">Loja Online</div>
<div class="card" onclick="abrirPlano('landing')">Landing Page</div>
<div class="card" onclick="abrirPlano('catalogo')">Catálogo</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="imgPlano">
<h2 id="titulo"></h2>
<p id="texto"></p>
<button class="fechar" onclick="fechar()">Fechar</button>
</div>
</div>

<footer>
📞 (13) 99646-9617<br>
✉️ joseluizariel@gmail.com<br>
© 2026 JL Sites • Agência Premium
</footer>

<script>

function abrirPlano(tipo){

let titulo="";
let texto="";
let imagem="";

if(tipo=="empresa"){
titulo="Site Empresa";
texto="Site profissional para negócios. Até 4 seções, WhatsApp e design moderno.";
imagem="https://images.unsplash.com/photo-1460925895917-afdab827c52f";
}

if(tipo=="loja"){
titulo="Loja Online";
texto="Loja com produtos, cards e pedido via WhatsApp.";
imagem="https://images.unsplash.com/photo-1522202176988-66273c2fd55f";
}

if(tipo=="landing"){
titulo="Landing Page";
texto="Página focada em vendas e anúncios.";
imagem="https://images.unsplash.com/photo-1519389950473-47ba0277781c";
}

if(tipo=="catalogo"){
titulo="Catálogo";
texto="Catálogo moderno para mostrar produtos ou serviços.";
imagem="https://images.unsplash.com/photo-1441986300917-64674bd600d8";
}

document.getElementById("titulo").innerText=titulo;
document.getElementById("texto").innerText=texto;
document.getElementById("imgPlano").src=imagem;

document.getElementById("modal").style.display="flex";
}

function fechar(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
